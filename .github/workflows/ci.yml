name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check boundaries
        run: bun run check-boundaries

      - name: Typecheck packages and workers
        run: |
          bun run --cwd packages/auth check-types
          bun run --cwd packages/contracts check-types
          bun run --cwd packages/db check-types
          bun run --cwd packages/trpc check-types
          bun run --cwd apps/api check-types
          bun run --cwd apps/recipe-ai check-types
          bun run --cwd apps/images check-types
          bunx tsc -p apps/native/tsconfig.json --noEmit

      - name: Run tests
        run: |
          bun run --cwd packages/trpc test
          bun run --cwd apps/api test
          bun run --cwd apps/recipe-ai test
